<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle - Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* --- 1. GLOBAL VARIABLES --- */
        :root {
            --primary: #00ff88;
            --primary-dim: rgba(0, 255, 136, 0.1);
            --primary-glow: 0 0 20px rgba(0, 255, 136, 0.4);
            --bg-dark: #050505;
            --glass: rgba(10, 10, 10, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888888;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- 2. BACKGROUND MAP --- */
        #bg-map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: grayscale(100%) contrast(1.2) brightness(1.6); /* Dark & Moody */
            pointer-events: none; /* Make it just a wallpaper */
        }
        
        /* Vignette Overlay */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* --- 3. LOGIN CARD --- */
        .login-card { 
            position: relative; z-index: 10;
            width: 90%; max-width: 400px; padding: 45px 30px; 
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Typography */
        h1 { font-size: 2.8rem; letter-spacing: -1px; margin: 0; font-weight: 800; color: white; }
        h1 span { color: var(--primary); text-shadow: var(--primary-glow); }
        .subtitle { color: var(--text-muted); margin-top: 5px; margin-bottom: 35px; font-size: 0.95rem; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }

        /* Inputs */
        .input-group { margin-bottom: 18px; text-align: left; }
        label { 
            display: block; font-size: 0.75rem; color: var(--text-muted); 
            margin-bottom: 8px; margin-left: 12px; font-weight: 600; letter-spacing: 1px;
        }

        input { 
            width: 100%; padding: 16px 20px;
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border); 
            color: white; border-radius: 16px; 
            font-size: 1rem; outline: none; font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus { 
            border-color: var(--primary); 
            background: rgba(0, 255, 136, 0.05); 
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        input::placeholder { color: #555; }
        
        /* Buttons */
        button { 
            width: 100%; padding: 18px; margin-top: 15px;
            background: var(--primary); color: #000; 
            border: none; border-radius: 16px; 
            font-size: 1rem; font-weight: 800; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: var(--primary-glow);
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        /* Links & Errors */
        .link { margin-top: 30px; font-size: 0.9rem; color: var(--text-muted); }
        .link a { color: var(--text-main); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--primary); padding-bottom: 2px; }
        
        #error-msg { 
            color: var(--danger); background: rgba(255, 68, 68, 0.1); 
            padding: 15px; border-radius: 12px; display: none; 
            margin-top: 20px; font-size: 0.9rem; border: 1px solid rgba(255, 68, 68, 0.2); 
            font-weight: 500;
        }

    </style>
</head>
<body>
    
    <div id="bg-map"></div>
    <div class="overlay"></div>

    <div class="login-card">
        <h1>CIRCLE<span>.</span></h1>
        <p class="subtitle">Enter the grid</p>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="username" autocomplete="off" onkeypress="handleEnter(event)">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" onkeypress="handleEnter(event)">
        </div>
        
        <button id="btn-login" onclick="login()">ENTER</button>
        
        <div id="error-msg"></div>
        
        <div class="link">
            New here? <a href="/signup/">Create Account</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. INIT BACKGROUND MAP
        // This creates a cool dark map effect
        const map = L.map('bg-map', { 
            zoomControl: false, 
            attributionControl: false, 
            zoomAnimation: false 
        }).setView([22.499442, 88.340215], 13); 

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
            subdomains: 'abcd', 
            maxZoom: 19 
        }).addTo(map);

        // Animation logic updated to match your coordinates
        let lat = 22.499442; 
        setInterval(() => { 
            lat += 0.00005; // Slightly slower speed for better vibes
            map.panTo([lat, 88.340215], { animate: true, duration: 10 }); 
        }, 1000);


        // 2. LOGIN LOGIC (Same Robust Logic)
        function handleEnter(e) { if(e.key === "Enter") login(); }
    
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');
    
            // Loading State
            btn.innerText = "AUTHENTICATING...";
            btn.style.opacity = "0.7";
            errorDiv.style.display = 'none';
    
            try {
                // Connect to API
                const response = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
    
                const data = await response.json();
    
                if (response.ok) {
                    const token = data.key || data.token;
                    if (!token) throw new Error("No token received");
    
                    // Save Token
                    localStorage.setItem('circle_token', token);
                    localStorage.setItem('circle_username', data.username || username);
                    
                    // Save Profile Data
                    if(data.real_name) localStorage.setItem('circle_realname', data.real_name);
                    if(data.bio) localStorage.setItem('circle_bio', data.bio);
                    if(data.gender) localStorage.setItem('circle_gender', data.gender);
                    if(data.dob) localStorage.setItem('circle_dob', data.dob);
                    if(data.profile_pic) localStorage.setItem('circle_pic', data.profile_pic);
    
                    // Success Animation
                    btn.style.backgroundColor = "white";
                    btn.style.color = "black";
                    btn.innerText = "ACCESS GRANTED";
                    
                    setTimeout(() => window.location.href = '/dashboard/', 500);
                } else {
                    errorDiv.innerText = data.non_field_errors || data.detail || "Login Failed";
                    errorDiv.style.display = 'block';
                    btn.innerText = "ENTER";
                    btn.style.opacity = "1";
                }
            } catch (error) {
                console.error(error);
                errorDiv.innerText = "Connection Error.";
                errorDiv.style.display = 'block';
                btn.innerText = "ENTER";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
