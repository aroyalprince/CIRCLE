<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle - Welcome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* --- 1. GLOBAL VARIABLES --- */
        :root {
            --primary: #00ff88;
            --primary-glow: 0 0 40px rgba(0, 255, 136, 0.6);
            --bg-dark: #050505;
            --glass: rgba(20, 20, 20, 0.4);
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* --- 2. BACKGROUND MAP --- */
        #bg-map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: grayscale(30%) contrast(1.1) brightness(0.6); /* Slightly darker for text pop */
            pointer-events: none; 
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 90%);
            pointer-events: none;
        }

        /* --- 3. HEADER (Top Bar) --- */
        .header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 25px 30px;
            display: flex; justify-content: flex-end; align-items: center;
            z-index: 100;
            gap: 15px;
        }

        .btn-nav {
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        .btn-nav:hover { background: rgba(255,255,255,0.1); border-color: white; }
        
        .btn-nav.highlight {
            background: white; color: black; border: none; font-weight: 700;
        }
        .btn-nav.highlight:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        /* --- 4. HERO SECTION (Center) --- */
        .hero {
            flex: 1;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
            text-align: center;
            padding-bottom: 50px; /* Offset visual center */
            animation: fadeIn 1s ease-out;
        }

        .hero-logo {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: white;
            margin: 0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hero-logo span { color: var(--primary); text-shadow: var(--primary-glow); }

        .tagline {
            font-size: 1.1rem;
            color: #ccc;
            margin-top: 10px;
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-start {
            padding: 20px 50px;
            background: var(--primary);
            color: black;
            font-size: 1.1rem;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--primary-glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-start:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.6);
        }
        .btn-start:active { transform: scale(0.95); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div id="bg-map"></div>
    <div class="overlay"></div>

    <nav class="header">
        <a href="/login/" class="btn-nav">Log In</a>
        <a href="/signup/" class="btn-nav highlight">Sign Up</a>
    </nav>

    <div class="hero">
        <h1 class="hero-logo">CIRCLE<span>.</span></h1>
        <p class="tagline">The Grid is waiting.</p>
        
        <button class="btn-start" onclick="startApp()">Let's Start</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. INIT BACKGROUND MAP (Kolkata Coordinates)
        const map = L.map('bg-map', { 
            zoomControl: false, 
            attributionControl: false, 
            zoomAnimation: false 
        }).setView([22.499442, 88.340215], 15); // Zoom 15 for street view

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
            subdomains: 'abcd', 
            maxZoom: 19 
        }).addTo(map);

        // Slow cinematic pan
        let lat = 22.499442; 
        setInterval(() => { 
            lat += 0.00003; 
            map.panTo([lat, 88.340215], { animate: true, duration: 10 }); 
        }, 1000);

        // 2. START BUTTON LOGIC
        function startApp() {
            // Check if user is already logged in
            const token = localStorage.getItem('circle_token');
            const btn = document.querySelector('.btn-start');
            
            // Animation
            btn.style.width = btn.offsetWidth + "px"; // Lock width
            btn.innerText = "LOADING...";
            btn.style.opacity = 0.8;

            setTimeout(() => {
                if (token) {
                    window.location.href = '/dashboard/';
                } else {
                    window.location.href = '/login/';
                }
            }, 800);
        }
    </script>

</body>
</html>
