<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle - Join</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* --- 1. GLOBAL VARIABLES --- */
        :root {
            --primary: #00ff88;
            --primary-glow: 0 0 20px rgba(0, 255, 136, 0.4);
            --bg-dark: #050505;
            --glass: rgba(10, 10, 10, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888888;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* --- 2. BACKGROUND MAP --- */
        #bg-map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: grayscale(30%) contrast(1.1) brightness(0.8); /* Premium Dark Look */
            pointer-events: none; 
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* --- 3. MAIN CARD --- */
        .container { 
            position: relative; z-index: 10;
            width: 90%; max-width: 450px; padding: 40px; 
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Steps Animation */
        .step { display: none; animation: fadeIn 0.4s ease-out; }
        .active-step { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Typography */
        h1, h2 { font-size: 2rem; letter-spacing: -0.5px; margin: 0 0 10px 0; font-weight: 800; color: white; }
        p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; }

        /* --- 4. CARDS (Entry Methods) --- */
        .door-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .door-card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            padding: 25px 15px; border-radius: 20px; 
            cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .door-card:active { transform: scale(0.96); }
        .door-card:hover { 
            border-color: var(--primary); 
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }
        .icon-large { font-size: 28px; margin-bottom: 8px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        
        /* --- 5. INPUTS --- */
        input, select { 
            width: 100%; padding: 16px 20px; margin-bottom: 12px;
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border); 
            color: white; border-radius: 14px; 
            font-size: 1rem; outline: none; font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus, select:focus { 
            border-color: var(--primary); 
            background: rgba(0, 255, 136, 0.05); 
        }

        /* Profile Pic Upload */
        .profile-upload {
            width: 110px; height: 110px; border-radius: 50%; 
            background: rgba(0,0,0,0.3); border: 2px dashed #444; 
            margin: 0 auto 25px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            transition: 0.3s;
        }
        .profile-upload:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        
        /* Buttons */
        .btn-next { 
            width: 100%; padding: 18px; margin-top: 15px;
            background: var(--primary); color: #000; 
            border: none; border-radius: 16px; 
            font-size: 1rem; font-weight: 800; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: var(--primary-glow);
        }
        .btn-next:active { transform: scale(0.98); opacity: 0.9; }

        .btn-back { 
            background: transparent; color: var(--text-muted); border: none; 
            margin-top: 20px; cursor: pointer; font-size: 0.9rem; font-weight: 500;
        }
        .btn-back:hover { color: white; }

        .error { 
            color: var(--danger); background: rgba(255, 68, 68, 0.1); 
            padding: 12px; border-radius: 10px; display: none; 
            margin-top: 15px; font-size: 0.85rem; border: 1px solid rgba(255, 68, 68, 0.2); 
        }

    </style>
</head>
<body>

    <div id="bg-map"></div>
    <div class="overlay"></div>

    <div class="container">

        <div id="step-1" class="step active-step">
            <h1>JOIN CIRCLE</h1>
            <p>Select your entry protocol.</p>
            
            <div class="door-grid">
                <div class="door-card" onclick="showStep(2)">
                    <div class="icon-large">🪪</div>
                    <div style="font-size:0.9rem; font-weight:700;">Manual ID</div>
                </div>
                <div class="door-card" onclick="alert('Google Auth Integration Required')">
                    <div class="icon-large">G</div>
                    <div style="font-size:0.9rem; font-weight:700;">Google</div>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <a href="/login/" style="color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 600;">Already a member? Login</a>
            </div>
        </div>

        <div id="step-2" class="step">
            <h2>Identity</h2>
            <p>Set up your public profile.</p>
            
            <label class="profile-upload" for="profile_pic">
                <img id="preview-img" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="cam-icon" style="font-size:2rem; opacity:0.5;">📷</span>
            </label>
            <input type="file" id="profile_pic" accept="image/*" style="display: none;" onchange="previewImage(this)">

            <input type="text" id="full_name" placeholder="Full Name">
            <input type="text" id="username" placeholder="@username">
            <input type="password" id="password" placeholder="Password">
            
            <div style="display: flex; gap: 10px;">
                <select id="gender" style="flex:1;">
                    <option value="O">Gender</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
                <input type="date" id="dob" style="flex:1; color: #aaa;">
            </div>

            <button class="btn-next" onclick="goToStep3()">NEXT STEP</button>
            <button class="btn-back" onclick="showStep(1)">Go Back</button>
        </div>

        <div id="step-3" class="step">
            <h2>Verify Access</h2>
            <p>Upload ID Card (Optional for Beta)</p>

            <div style="border: 2px dashed rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; background: rgba(0,0,0,0.2); margin-bottom: 20px; cursor: pointer;" onclick="document.getElementById('id_card').click()">
                <span style="font-size: 2rem; display: block; margin-bottom: 10px;">📄</span>
                <span style="font-size: 0.9rem; color: #888;">Tap to upload document</span>
                <input type="file" id="id_card" accept="image/*" style="display:none;">
            </div>

            <button class="btn-next" id="btn-submit" onclick="submitSignup()">FINISH & JOIN</button>
            <button class="btn-back" onclick="showStep(2)">Back</button>
            
            <div id="error-msg" class="error">Error</div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. INIT BACKGROUND MAP (UPDATED WITH YOUR LOCATION)
        const map = L.map('bg-map', { 
            zoomControl: false, 
            attributionControl: false, 
            zoomAnimation: false 
        }).setView([22.499442, 88.340215], 13); 

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
            subdomains: 'abcd', 
            maxZoom: 19 
        }).addTo(map);

        // Animation logic updated to match your coordinates
        let lat = 22.499442; 
        setInterval(() => { 
            lat += 0.00005; // Slightly slower speed for better vibes
            map.panTo([lat, 88.340215], { animate: true, duration: 10 }); 
        }, 1000);

        // 2. WIZARD LOGIC
        function showStep(n) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active-step'));
            document.getElementById(`step-${n}`).classList.add('active-step');
        }

        function goToStep3() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Username & Password required");
            showStep(3);
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('cam-icon').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 3. SUBMIT LOGIC
        async function submitSignup() {
            const btn = document.getElementById('btn-submit');
            const errorDiv = document.getElementById('error-msg');
            
            btn.innerText = "INITIALIZING...";
            btn.style.opacity = "0.7";
            errorDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('full_name', document.getElementById('full_name').value);
            formData.append('gender', document.getElementById('gender').value);
            
            const dob = document.getElementById('dob').value;
            if(dob) formData.append('dob', dob);

            const pic = document.getElementById('profile_pic').files[0];
            if (pic) formData.append('profile_pic', pic);

            const idCard = document.getElementById('id_card').files[0];
            if (idCard) formData.append('id_card', idCard);

            try {
                const response = await fetch('/api/auth/signup/manual/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // Success Animation
                    btn.innerText = "WELCOME";
                    btn.style.backgroundColor = "white";
                    btn.style.color = "black";

                    localStorage.setItem('circle_token', data.token);
                    localStorage.setItem('circle_username', document.getElementById('username').value);
                    localStorage.removeItem('circle_pic'); 
                    
                    setTimeout(() => window.location.href = '/dashboard/', 800);
                } else {
                    console.error("Signup Error:", data);
                    errorDiv.innerText = data.error || data.detail || "Signup Failed";
                    errorDiv.style.display = 'block';
                    btn.innerText = "TRY AGAIN";
                    btn.style.opacity = "1";
                }
            } catch (e) {
                console.error(e);
                errorDiv.innerText = "Connection Error.";
                errorDiv.style.display = 'block';
                btn.innerText = "TRY AGAIN";
                btn.style.opacity = "1";
            }
        }
    </script>

</body>
</html>
